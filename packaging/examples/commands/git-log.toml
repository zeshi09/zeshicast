name = "Git Log"
mode = "shell"
keyword = "git-log"
argument_hint = "<path>"
command = "cd {{pref:workspace}} && git log --oneline -20 {{query}} | head -20"
description = "Show recent git commits"
tags = ["dev", "git"]
icon = "vcs-commit-symbolic"
permissions = ["shell", "filesystem"]

[preferences]
workspace = "~/Code"
