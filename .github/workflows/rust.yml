name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust / ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
        - name: fmt
          command: cargo fmt --check
        - name: check
          command: cargo check
        - name: test
          command: cargo test

    steps:
    - uses: actions/checkout@v4
    - name: Run ${{ matrix.name }}
      run: ${{ matrix.command }}

  nix:
    name: Nix / ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
        - name: flake-check
          command: nix flake check
        - name: package-build
          command: nix build
        - name: gui-check
          command: nix develop --command cargo check --features gui
        - name: gui-clippy
          command: nix develop --command cargo clippy --all-targets --features gui -- -D warnings
        - name: layer-shell-check
          command: nix develop --command cargo check --features gui,layer-shell

    steps:
    - uses: actions/checkout@v4
    - name: Install Nix
      uses: cachix/install-nix-action@v31
      with:
        extra_nix_config: |
          experimental-features = nix-command flakes
    - name: Cache Nix store
      uses: DeterminateSystems/magic-nix-cache-action@v14
    - name: Run ${{ matrix.name }}
      run: ${{ matrix.command }}

  supply-chain:
    name: Supply Chain
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: cargo-deny
      uses: EmbarkStudios/cargo-deny-action@v2
      with:
        command: check
        arguments: --all-features
