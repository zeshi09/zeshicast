    .lw{width:100%;background:#13131C;border-radius:14px;overflow:hidden;position:relative;
      box-shadow:0 0 0 1px rgba(255,255,255,.09),inset 0 1px 0 rgba(255,255,255,.06),
                 0 4px 12px rgba(0,0,0,.28),0 18px 52px rgba(0,0,0,.42),0 44px 100px rgba(0,0,0,.54);
      animation:lopen 130ms cubic-bezier(.34,1.56,.64,1) both}
    @keyframes lopen{from{opacity:0;transform:scale(.96) translateY(-5px)}to{opacity:1;transform:scale(1) translateY(0)}}
    @keyframes renter{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:translateY(0)}}
    @keyframes panin{from{opacity:0;transform:translateX(12px)}to{opacity:1;transform:translateX(0)}}
    @keyframes din{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
    .rrow{animation:renter 130ms ease both}.rrow:hover{background:rgba(255,255,255,.04)!important}
    .arow:hover{background:rgba(255,255,255,.05)!important}
    .schip:hover{background:rgba(255,255,255,.08)!important}
    .dcard{animation:din 200ms ease both;background:rgba(255,255,255,.038);border:1px solid rgba(255,255,255,.07);
      border-radius:10px;transition:background 140ms,border-color 140ms,transform 140ms}
    .dcard:hover{background:rgba(255,255,255,.065);border-color:rgba(255,255,255,.11);transform:translateY(-1px)}
    .panwrap{animation:panin 120ms cubic-bezier(.25,.46,.45,.94) both}
    .sinput{background:transparent;border:none;outline:none;width:100%;color:rgba(255,255,255,.94);
      font-family:inherit;font-size:17px;font-weight:400;letter-spacing:-.02em;caret-color:var(--ac,#8B7CF8)}
    .sinput::placeholder{color:rgba(255,255,255,.24)}
    .aiinput{background:transparent;border:none;outline:none;width:100%;color:rgba(255,255,255,.9);
      font-family:inherit;font-size:14px;resize:none;line-height:1.5}
    .aiinput::placeholder{color:rgba(255,255,255,.22)}
    .scr::-webkit-scrollbar{width:3px}.scr::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
    .scr::-webkit-scrollbar-track{background:transparent}
    .aibub-u{background:rgba(139,124,248,.11);border:1px solid rgba(139,124,248,.20);border-radius:10px 10px 3px 10px}
    .aibub-a{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:10px 10px 10px 3px}
    .tpanel{position:fixed;bottom:24px;right:24px;z-index:200;display:flex;flex-direction:column;align-items:flex-end;gap:8px}
    .tbox{background:#1A1A26;border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:14px 16px;
      display:flex;flex-direction:column;gap:12px;min-width:190px;box-shadow:0 8px 32px rgba(0,0,0,.4)}
    .tlabel{font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:rgba(255,255,255,.3);margin-bottom:2px}
    .tbtn{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:6px;padding:3px 9px;
      font-size:11px;color:rgba(255,255,255,.5);cursor:default;font-family:inherit;transition:background 100ms,color 100ms}
    .tbtn.on{background:rgba(139,124,248,.18);border-color:rgba(139,124,248,.4);color:#8B7CF8}
    .tswatch{width:18px;height:18px;border-radius:50%;cursor:default;border:2px solid transparent;transition:transform 100ms,border-color 100ms}

    .ttoggle{padding:5px 12px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:8px;

// ── ATOMS ─────────────────────────────────────────────────────
function AppIcon({item,size=18}){
  const r=Math.round(size*.26);
  if(item.t==='command') return <div style={{width:size,height:size,flexShrink:0,borderRadius:'50%',background:'rgba(255,255,255,.055)',border:'1px solid rgba(255,255,255,.085)',display:'flex',alignItems:'center',justifyContent:'center',color:'rgba(255,255,255,.4)',fontSize:Math.round(size*.52),lineHeight:1,userSelect:'none'}}>{item.icon}</div>;
  return <div style={{width:size,height:size,flexShrink:0,borderRadius:r,background:item.bg||'#1A1A22',border:'1px solid rgba(255,255,255,.055)',display:'flex',alignItems:'center',justifyContent:'center',color:item.accent||'rgba(255,255,255,.85)',fontSize:Math.round(size*.52),fontWeight:700,letterSpacing:'-.02em',lineHeight:1,userSelect:'none'}}>{item.L}</div>;
}
function KBadge({children}){return <span style={{display:'inline-flex',alignItems:'center',padding:'2px 5px',background:'rgba(255,255,255,.055)',border:'1px solid rgba(255,255,255,.10)',borderRadius:5,fontSize:11,fontFamily:"'JetBrains Mono',monospace",color:'rgba(255,255,255,.38)',letterSpacing:'.01em',lineHeight:1.45,whiteSpace:'nowrap'}}>{children}</span>}
function SecHdr({label}){return <div style={{padding:'10px 14px 3px',fontSize:11,fontWeight:600,letterSpacing:'.075em',textTransform:'uppercase',color:'rgba(255,255,255,.28)',userSelect:'none'}}>{label}</div>}
function Pill({label}){return <span style={{padding:'2px 7px',background:'rgba(255,255,255,.055)',borderRadius:6,fontSize:11,fontWeight:500,color:'rgba(255,255,255,.28)',letterSpacing:'.01em',flexShrink:0}}>{label}</span>}
function SignalBars({val}){const b=4,a=Math.round((val/100)*b);return <div style={{display:'flex',gap:2,alignItems:'flex-end',height:14,flexShrink:0}}>{[...Array(b)].map((_,i)=><div key={i} style={{width:3,borderRadius:1,height:4+i*3,background:i<a?'rgba(255,255,255,.72)':'rgba(255,255,255,.14)'}}/>)}</div>}
function Toggle({on,onClick,accent}){return <div onClick={onClick} style={{width:34,height:18,borderRadius:9,cursor:'default',flexShrink:0,background:on?accent:'rgba(255,255,255,.1)',position:'relative',transition:'background 150ms'}}><div style={{position:'absolute',top:2,left:on?16:2,width:14,height:14,borderRadius:'50%',background:'#fff',transition:'left 150ms'}}/></div>}

// ── RESULT ROW ────────────────────────────────────────────────
function RRow({item,sel,rh,ai,onSel,accent}){
  return <div className="rrow" onClick={()=>onSel(item)} style={{height:rh,padding:'0 14px',display:'flex',alignItems:'center',gap:10,cursor:'default',userSelect:'none',background:sel?'rgba(255,255,255,.08)':'transparent',boxShadow:sel?`inset 3px 0 0 ${accent}`:'none',animationDelay:`${Math.min(ai,5)*9}ms`}}>
    <AppIcon item={item} size={18}/>
    <div style={{flex:1,minWidth:0}}>
      <div style={{fontSize:15,fontWeight:500,color:'rgba(255,255,255,.93)',letterSpacing:'-.012em',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{item.title}</div>
      {item.sub&&<div style={{fontSize:12,marginTop:1,color:'rgba(255,255,255,.4)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{item.sub}</div>}
    </div>
    {sel&&<Pill label={item.t==='app'?'Application':'Command'}/>}
  </div>;
}

// ── SEARCH VIEW ───────────────────────────────────────────────
function SearchView({query,selIdx,onSel,rh,accent}){
  const isCalc=query.startsWith('=');
  const filtered=useMemo(()=>{
    if(isCalc||!query)return isCalc?[]:ITEMS;
    const q=query.toLowerCase();
    return ITEMS.filter(i=>i.title.toLowerCase().includes(q)||(i.sub&&i.sub.toLowerCase().includes(q)));
  },[query,isCalc]);
  const groups=useMemo(()=>{const m={};filtered.forEach(i=>{if(!m[i.g])m[i.g]=[];m[i.g].push(i);});return m;},[filtered]);
  if(isCalc){
    const expr=query.slice(1).trim();let res='0';
    try{if(expr)res=String(Function('"use strict";return('+expr+')')())}catch(e){res='—'}
    return <div style={{padding:'0 14px'}}><div style={{display:'flex',alignItems:'center',gap:10,height:56}}>
      <div style={{width:18,height:18,flexShrink:0,borderRadius:5,background:`${accent}22`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,color:accent,fontWeight:700}}>=</div>
      <div style={{flex:1}}><div style={{fontSize:12,color:'rgba(255,255,255,.36)',fontFamily:"'JetBrains Mono',monospace"}}>{expr||'Enter expression…'}</div><div style={{fontSize:24,fontWeight:700,letterSpacing:'-.02em',color:expr?'rgba(255,255,255,.93)':'rgba(255,255,255,.2)',fontFamily:"'JetBrains Mono',monospace"}}>{res}</div></div>
      <KBadge>⌃C</KBadge>
    </div></div>;
  }
  if(!filtered.length)return <div style={{padding:'28px 16px',textAlign:'center',color:'rgba(255,255,255,.26)',fontSize:13}}>No results for <span style={{color:'rgba(255,255,255,.48)'}}>&ldquo;{query}&rdquo;</span></div>;
  let fi=0,ai=0;
  return <div>{GORDER.filter(g=>groups[g]).map(gn=><div key={gn}>{!query&&<SecHdr label={gn}/>}{groups[gn].map(item=>{const f=fi++,a=ai++;return <RRow key={item.id} item={item} sel={f===selIdx} rh={rh} ai={a} onSel={onSel} accent={accent}/>;})}</div>)}</div>;
}

// ── CLIPBOARD ─────────────────────────────────────────────────
const TYPE_ICON={code:'⊟',url:'⊞',text:'≡'};
const TYPE_LABEL={code:'Code',url:'URL',text:'Text'};
function ClipView({accent}){
  const [sel,setSel]=useState(0);
  const [copied,setCopied]=useState(false);
  const item=CLIP[sel];
  function copy(){navigator.clipboard?.writeText(item.text);setCopied(true);setTimeout(()=>setCopied(false),1400);}
  const isMono=item.k!=='text';
  const wc=item.text.trim().split(/\s+/).length;
  return (
    <div style={{display:'flex',height:344}}>
      {/* List */}
      <div className="scr" style={{width:216,flexShrink:0,borderRight:'1px solid rgba(255,255,255,.06)',overflowY:'auto'}}>
        {CLIP.map((c,i)=>(
          <div key={c.id} className="rrow" onClick={()=>{setSel(i);setCopied(false);}}
            style={{height:52,padding:'0 12px',display:'flex',alignItems:'center',gap:8,cursor:'default',
              background:i===sel?'rgba(255,255,255,.08)':'transparent',
              boxShadow:i===sel?`inset 3px 0 0 ${accent}`:'none',
              animationDelay:`${i*9}ms`}}>
            <div style={{width:16,height:16,flexShrink:0,borderRadius:4,
              background:i===sel?`${accent}1A`:'rgba(255,255,255,.05)',
              border:`1px solid ${i===sel?accent+'35':'rgba(255,255,255,.08)'}`,
              display:'flex',alignItems:'center',justifyContent:'center',
              fontSize:8,color:i===sel?accent:'rgba(255,255,255,.3)'}}>
              {TYPE_ICON[c.k]}
            </div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:12,color:i===sel?'rgba(255,255,255,.88)':'rgba(255,255,255,.58)',
                fontFamily:c.k!=='text'?"'JetBrains Mono',monospace":'inherit',
                overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',
                letterSpacing:c.k==='code'?'-.01em':'normal',lineHeight:1.4,marginBottom:2}}>
                {c.text.split('\n')[0]}
              </div>
              <div style={{fontSize:10,color:'rgba(255,255,255,.24)'}}>{c.time}</div>
            </div>
          </div>
        ))}
      </div>

      {/* Preview */}
      {item&&(
        <div style={{flex:1,minWidth:0,display:'flex',flexDirection:'column'}}>
          {/* Meta bar */}
          <div style={{padding:'7px 12px',borderBottom:'1px solid rgba(255,255,255,.06)',
            display:'flex',alignItems:'center',gap:6,flexShrink:0}}>
            <span style={{padding:'1px 6px',background:`${accent}18`,
              border:`1px solid ${accent}35`,borderRadius:4,
              fontSize:10,fontWeight:600,letterSpacing:'.05em',

function PBar({val,accent,delay=0}){
  const [w,setW]=useState(0);
  useEffect(()=>{const t=setTimeout(()=>setW(val),60+delay);return()=>clearTimeout(t);},[val]);
  const col=val>85?'#FF6B5F':val>65?'#F5A623':accent;
  return <div style={{height:3,background:'rgba(255,255,255,.07)',borderRadius:2,overflow:'hidden',marginTop:8}}><div style={{height:'100%',borderRadius:2,background:col,width:w+'%',transition:'width 600ms cubic-bezier(.34,1.1,.64,1)'}}/></div>;
}

// ── SYSTEM MONITOR ────────────────────────────────────────────
function SysMonView({accent}){
  const [cpu,setCpu]=useState(23);
  const [hist,setHist]=useState(()=>Array(22).fill(0).map(()=>Math.round(Math.random()*22+8)));
  const [cores,setCores]=useState(()=>Array(8).fill(0).map(()=>Math.round(Math.random()*38+4)));
  const [netD,setNetD]=useState(8.4); const [netU,setNetU]=useState(0.12);
  const [sort,setSort]=useState('mem'); const [filter,setFilter]=useState('');
  const [hover,setHover]=useState(null);
  const [procs,setProcs]=useState(PROCS);

  useEffect(()=>{
    const id=setInterval(()=>{
      setCpu(v=>{const n=Math.round(Math.max(4,Math.min(90,v+(Math.random()-.5)*10)));setHist(h=>[...h.slice(1),n]);return n;});
      setCores(cs=>cs.map(c=>Math.round(Math.max(0,Math.min(100,c+(Math.random()-.5)*18)))));
      setNetD(v=>Math.max(.1,+(v+(Math.random()-.5)*2.5).toFixed(1)));
      setNetU(v=>Math.max(0,+(v+(Math.random()-.5)*.09).toFixed(2)));
      setProcs(ps=>ps.map(p=>({...p,cpu:+Math.max(0,Math.min(98,p.cpu+(Math.random()-.5)*2.2)).toFixed(1)})));
    },1800);
    return()=>clearInterval(id);
  },[]);

  // Sparkline SVG
  const SW=114,SH=28,maxH=Math.max(...hist,1);
  const pts=hist.map((v,i)=>`${i*(SW/(hist.length-1))},${SH-1-(v/maxH)*(SH-3)}`).join(' ');

  const filtered=procs.filter(p=>!filter||p.name.includes(filter.toLowerCase()));
  const sorted=[...filtered].sort((a,b)=>b[sort]-a[sort]);
  const fmt=v=>v>=1024?(v/1024).toFixed(1)+'G':v+'M';
  const cpuCol=cpu>80?'#FF6B5F':cpu>60?'#F5A623':accent;

  return <div style={{display:'flex',flexDirection:'column',maxHeight:376}}>

            <div style={{position:'absolute',bottom:0,left:0,right:0,background:c>80?'#FF6B5F':c>60?'#F5A623':accent,height:c+'%',transition:'height 500ms ease',borderRadius:2}}/>
          </div>)}
        </div>
        <div style={{flex:1}}/>
        <svg width={SW} height={SH}>
          <defs><linearGradient id="sg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={accent} stopOpacity=".22"/><stop offset="100%" stopColor={accent} stopOpacity="0"/></linearGradient></defs>
          <polygon points={`0,${SH} ${pts} ${SW},${SH}`} fill="url(#sg)"/>
          <polyline points={pts} fill="none" stroke={accent} strokeWidth={1.5} strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      </div>

      {/* Memory: segmented bar */}
      <div style={{display:'flex',alignItems:'center',gap:10}}>
        <span style={{fontSize:10,fontWeight:600,letterSpacing:'.06em',textTransform:'uppercase',color:'rgba(255,255,255,.3)',width:30}}>RAM</span>
        <div style={{flex:1,height:5,borderRadius:3,background:'rgba(255,255,255,.06)',overflow:'hidden',display:'flex'}}>
          <div style={{width:'51.25%',background:'#FF6B5F',transition:'width 600ms'}}/>
          <div style={{width:'13.1%',background:accent+'80',transition:'width 600ms'}}/>
        </div>
        <span style={{fontSize:11,color:'rgba(255,255,255,.5)',fontVariantNumeric:'tabular-nums',whiteSpace:'nowrap'}}>8.2 <span style={{color:'rgba(255,255,255,.24)'}}>/</span> 16 GB</span>
        <div style={{display:'flex',gap:6}}>
          {[['Used','#FF6B5F'],['Cached',accent+'99']].map(([l,c])=><span key={l} style={{fontSize:10,color:'rgba(255,255,255,.28)',display:'flex',alignItems:'center',gap:3}}><span style={{width:6,height:6,borderRadius:2,background:c,display:'inline-block',flexShrink:0}}/>{l}</span>)}
        </div>
      </div>

      {/* Network */}
      <div style={{display:'flex',alignItems:'center',gap:6}}>
        <span style={{fontSize:10,fontWeight:600,letterSpacing:'.06em',textTransform:'uppercase',color:'rgba(255,255,255,.3)',width:30}}>NET</span>
        {[['↓',netD,'MB/s'],['↑',netU,'MB/s']].map(([ic,v,u])=><div key={ic} style={{display:'flex',alignItems:'center',gap:3,padding:'2px 7px',background:'rgba(255,255,255,.04)',border:'1px solid rgba(255,255,255,.07)',borderRadius:5}}>

          <span style={{fontSize:11,fontFamily:"'JetBrains Mono',monospace",fontVariantNumeric:'tabular-nums',color:'rgba(255,255,255,.62)'}}>{v}</span>
          <span style={{fontSize:9,color:'rgba(255,255,255,.26)'}}>{u}</span>
        </div>)}
        <div style={{flex:1}}/>
        <span style={{fontSize:10,color:'rgba(255,255,255,.22)',fontFamily:"'JetBrains Mono',monospace"}}>DISK ↓ 12.3 MB/s</span>
      </div>
    </div>

    {/* ── Table header + filter ── */}
    <div style={{display:'flex',alignItems:'center',padding:'4px 14px',borderBottom:'1px solid rgba(255,255,255,.05)',gap:8}}>
      <span style={{fontSize:10,color:'rgba(255,255,255,.22)',width:14}}>⊟</span>
      <input value={filter} onChange={e=>setFilter(e.target.value)} placeholder="filter processes…"
        style={{flex:1,background:'transparent',border:'none',outline:'none',fontSize:11,
          color:'rgba(255,255,255,.6)',fontFamily:"'JetBrains Mono',monospace"}} spellCheck={false}/>
      {[['cpu','CPU'],['mem','MEM']].map(([k,l])=><button key={k} onClick={()=>setSort(k)} style={{width:46,border:'none',background:'transparent',cursor:'default',textAlign:'right',fontSize:10,fontWeight:600,letterSpacing:'.06em',textTransform:'uppercase',color:sort===k?accent:'rgba(255,255,255,.2)',fontFamily:'inherit'}}>{l}{sort===k?' ↓':''}</button>)}
      <div style={{width:18}}/>
    </div>

    {/* ── Process list ── */}
    <div className="scr" style={{flex:1,overflowY:'auto'}}>
      {sorted.map((p,i)=><div key={p.pid} className="rrow"
        onMouseEnter={()=>setHover(p.pid)} onMouseLeave={()=>setHover(null)}
        style={{height:34,padding:'0 14px',display:'flex',alignItems:'center',gap:7,cursor:'default',animationDelay:`${i*10}ms`}}>
        <span style={{flex:1,fontSize:12,color:'rgba(255,255,255,.72)',fontFamily:"'JetBrains Mono',monospace",overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.name}</span>
        <div style={{width:36,height:3,borderRadius:2,background:'rgba(255,255,255,.06)',overflow:'hidden',flexShrink:0}}>
          <div style={{height:'100%',width:Math.min(100,p.cpu/25*100)+'%',background:p.cpu>12?'#F5A623':accent,borderRadius:2,transition:'width 700ms ease'}}/>
        </div>
        <span style={{width:40,textAlign:'right',fontSize:11,fontFamily:"'JetBrains Mono',monospace",fontVariantNumeric:'tabular-nums',color:p.cpu>8?accent:'rgba(255,255,255,.36)',flexShrink:0}}>{p.cpu}%</span>
        <span style={{width:44,textAlign:'right',fontSize:11,fontFamily:"'JetBrains Mono',monospace",fontVariantNumeric:'tabular-nums',color:p.mem>500?accent:'rgba(255,255,255,.34)',flexShrink:0}}>{fmt(p.mem)}</span>

      </div>)}

    </div>
  </div>;
}

    {open&&<div className="tbox">
      <div><div className="tlabel">Accent</div><div style={{display:'flex',gap:6,marginTop:4}}>{ACCENTS.map(a=><div key={a.c} className={`tswatch${accent===a.c?' on':''}`} title={a.n} onClick={()=>setAccent(a.c)} style={{background:a.c}}/>)}</div></div>
      <div><div className="tlabel">Row Style</div><div style={{display:'flex',gap:4,marginTop:4}}>{[['compact',44],['comfortable',52]].map(([l,v])=><button key={l} className={`tbtn${rh===v?' on':''}`} onClick={()=>setRh(v)}>{l}</button>)}</div></div>
      <div><div className="tlabel">View</div>
        <select value={view} onChange={e=>setView(e.target.value)} style={{marginTop:4,width:'100%',background:'rgba(255,255,255,.06)',border:'1px solid rgba(255,255,255,.12)',borderRadius:6,padding:'5px 8px',color:'rgba(255,255,255,.7)',fontSize:12,fontFamily:'inherit',cursor:'default',outline:'none'}}>
          {ALL_VIEWS.map(([k,l])=><option key={k} value={k}>{l}</option>)}
        </select>
      </div>
    </div>}
    <button className="ttoggle" onClick={()=>setOpen(o=>!o)}>{open?'✕ Close':'⚙ Tweaks'}</button>
  </div>;
}

// ── APP ───────────────────────────────────────────────────────
function App(){
  const [accent,setAccent]=useState('#8B7CF8');
  const [rh,setRh]=useState(44);
  const [view,setView]=useState('search');
  const [query,setQuery]=useState('');
  const [si,setSi]=useState(0);
  const [showPanel,setShowPanel]=useState(false);
  const [aiQ,setAiQ]=useState('');
  const isCalc=query.startsWith('=');
  const filtered=useMemo(()=>{
    if(isCalc||view!=='search')return[];
    if(!query)return ITEMS;
    const q=query.toLowerCase();
    return ITEMS.filter(i=>i.title.toLowerCase().includes(q)||(i.sub&&i.sub.toLowerCase().includes(q)));
  },[query,view,isCalc]);
  const cSi=Math.min(si,Math.max(0,filtered.length-1));
  function nav(item){if(!item)return;if(item.nav){setView(item.nav);setQuery('');}}
  useEffect(()=>{
    function onKey(e){
      if(e.key==='Escape'){if(showPanel){setShowPanel(false);return;}if(view!=='search'){setView('search');return;}setQuery('');}
      if(e.ctrlKey&&e.key==='k'){e.preventDefault();setShowPanel(s=>!s);}
      if(e.key==='Tab'&&!e.shiftKey&&view==='search'){e.preventDefault();setAiQ(query);setQuery('');setView('ai');}
      if(e.key==='ArrowDown'){e.preventDefault();setSi(i=>Math.min(i+1,filtered.length-1));}
      if(e.key==='ArrowUp'){e.preventDefault();setSi(i=>Math.max(i-1,0));}
      if(e.key==='Enter'&&!showPanel)nav(filtered[cSi]);
    }
    window.addEventListener('keydown',onKey);return()=>window.removeEventListener('keydown',onKey);
  },[showPanel,view,query,filtered,cSi]);
  const selItem=view==='search'?filtered[cSi]:null;
  function changeView(v){setView(v);setQuery('');}
  return <>
    <div className="lw" style={{'--ac':accent}}>
      <SearchBar query={query} onChange={v=>{setQuery(v);setSi(0);}} calcMode={isCalc} onClearCalc={()=>setQuery('')} accent={accent} view={view} onBack={()=>{setView('search');setQuery('');}}/>
      <div style={{position:'relative'}}>
        <div className="scr" style={{maxHeight:344,overflowY:'auto'}}>
          {view==='search'    && <SearchView query={query} selIdx={cSi} onSel={item=>{setSi(filtered.indexOf(item));nav(item);}} rh={rh} accent={accent}/>}
          {view==='dashboard' && <DashView accent={accent}/>}
          {view==='ai'        && <AIView accent={accent} initQ={aiQ}/>}
          {view==='clipboard' && <ClipView accent={accent}/>}
          {view==='emoji'     && <EmojiView accent={accent}/>}
          {view==='fonts'     && <FontView accent={accent}/>}
          {view==='network'   && <NetworkView accent={accent}/>}
          {view==='audio'     && <AudioView accent={accent}/>}
          {view==='media'     && <MediaView accent={accent}/>}
          {view==='notifs'    && <NotifView/>}
          {view==='sysmon'    && <SysMonView accent={accent}/>}
          {view==='prefs'     && <PrefsView accent={accent}/>}
          {view==='exts'      && <ExtsView accent={accent}/>}
        </div>
        {showPanel&&<ActionPanel selItem={selItem} accent={accent} onClose={()=>setShowPanel(false)}/>}
      </div>
      <ActionBar total={filtered.length} view={view} onPanel={()=>setShowPanel(s=>!s)}/>
      <StatusStrip accent={accent}/>
    </div>
    <TweaksPanel accent={accent} setAccent={setAccent} rh={rh} setRh={setRh} view={view} setView={changeView}/>
  </>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
